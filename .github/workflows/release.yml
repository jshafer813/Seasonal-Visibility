name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet publish -c Release -o ./dist

      - name: Get checksum
        id: checksum
        run: |
          MD5=$(md5sum ./dist/Jellyfin.Plugin.SeasonalVisibility.dll | awk '{print $1}')
          echo "md5=$MD5" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest
        run: |
          python3 - << 'PYEOF'
          import json, os
          with open('manifest.json', 'r') as f:
              manifest = json.load(f)
          version = os.environ['VERSION'] + '.0'
          checksum = os.environ['CHECKSUM']
          ref = os.environ['REF']
          repo = os.environ['REPO']
          manifest[0]['versions'][0]['version'] = version
          manifest[0]['versions'][0]['checksum'] = checksum
          manifest[0]['versions'][0]['sourceUrl'] = f'https://github.com/{repo}/releases/download/{ref}/Jellyfin.Plugin.SeasonalVisibility.dll'
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.md5 }}
          REF: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/Jellyfin.Plugin.SeasonalVisibility.dll
          body: |
            ## Seasonal Visibility ${{ github.ref_name }}

            Install via repository URL:
```
            https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
